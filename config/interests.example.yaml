# Report language for Claude Code round-table notes ("en", "zh", ...).
# The deterministic quick-scan template stays English.
language: "en"
vault_path: ""

daily:
  # Fetch budget, split across categories (100 over 4 categories = ~25 newest each).
  candidate_limit: 100
  recommendation_count: 10
  deep_analysis_count: 3
  skip_seen: true

sources:
  arxiv:
    enabled: true
    keyword_search: true   # also search arXiv by keywords (helps thin-coverage fields)
    categories:
      - "cs.AI"
      - "cs.CL"
      - "cs.LG"
      - "cs.CV"

research_domains:
  "Agents":
    priority: 5
    keywords:
      - "agent"
      - "multi-agent"
      - "tool use"
      - "planning"
      - "workflow"
      - "autonomous"
    arxiv_categories:
      - "cs.AI"
      - "cs.CL"

  "Reasoning":
    priority: 4
    keywords:
      - "reasoning"
      - "chain-of-thought"
      - "verification"
      - "test-time compute"
      - "planning"
    arxiv_categories:
      - "cs.AI"
      - "cs.CL"
      - "cs.LG"

  "Multimodal":
    priority: 3
    keywords:
      - "multimodal"
      - "vision-language"
      - "VLM"
      - "image-text"
      - "visual grounding"
    arxiv_categories:
      - "cs.CV"
      - "cs.CL"
      - "cs.MM"

excluded_keywords:
  - "workshop"
